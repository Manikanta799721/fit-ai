services:
  - type: web
    name: fitai-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB_NAME
        value: fitai_db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
